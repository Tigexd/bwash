<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="htmlTitle"></title>
    <link rel="stylesheet" href="style.css">

</head>
</head>

<body>

    <main id="terminal">
        <div id="output"></div>
        <div class="input-line">
            <span id="prompt-prefix"></span>
            <input type="text" id="command-input" autocomplete="off" spellcheck="false" autofocus>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function changeTitle() {
    htmlTitle.innerHTML = username + "@bash:" + displayPath;
}

const input = document.getElementById("command-input");

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        changeTitle(); // Calls your function
    }
});
}
    </script>

</body>

</html>
